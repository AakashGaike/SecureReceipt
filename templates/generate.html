<!-- templates/generate.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Generate Receipt | SecureReceipt</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <h1>Generate Secure Receipt</h1>
  <form method="POST" action="/generate" id="receipt-form">
    <label>Receipt ID: <input type="text" name="receipt_id" required></label><br>
    <label>Store ID: <input type="text" name="store_id" required></label><br>

    <label>Timestamp: <input type="datetime-local" name="timestamp" required></label><br>

    <h3>Items</h3>
    <div id="items-container">
      <div class="item">
        <input type="text" name="item_name[]" placeholder="Item Name" required>
        <input type="number" name="item_quantity[]" placeholder="Qty" required>
        <input type="number" step="0.01" name="item_price[]" placeholder="Price" required>
      </div>
    </div>
    <button type="button" onclick="addItem()">+ Add Item</button><br><br>

    <label>Total Amount: <input type="number" step="0.01" name="total_amount" required></label><br><br>

    <button type="submit">Generate Receipt</button>
  </form>

  <script>
    function addItem() {
      const container = document.getElementById("items-container");
      const div = document.createElement("div");
      div.classList.add("item");
      div.innerHTML = `
        <input type="text" name="item_name[]" placeholder="Item Name" required>
        <input type="number" name="item_quantity[]" placeholder="Qty" required>
        <input type="number" step="0.01" name="item_price[]" placeholder="Price" required>
      `;
      container.appendChild(div);
    }
  </script>
</body>
</html>
