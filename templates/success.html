<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Receipt Generated</title>
</head>
<body>
  <h1>Receipt Created Successfully ✅</h1>
  <p>Receipt ID: {{ result.receipt_id }}</p>

  <p><a href="/">Back to Home</a></p>

</html>
